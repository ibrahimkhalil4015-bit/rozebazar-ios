workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: Build Unsigned iOS App
        script: |
          # Compile the Xcode project into a .app bundle without signing certificates
          xcodebuild build \
            -project Rozebazar.xcodeproj \
            -scheme Rozebazar \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package App into IPA
        script: |
          # Package the compiled .app into an installable .ipa file
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Rozebazar.app Payload/
          zip -r Rozebazar.ipa Payload
    artifacts:
      - "*.ipa"
